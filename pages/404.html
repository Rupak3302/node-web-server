<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
      --accent: #6c63ff; --accent2: #ff6584;
      --text: #e8e8f0; --muted: #6b6b80;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      overflow: hidden;
    }

    /* Animated background number */
    .bg-404 {
      position: fixed; font-family: var(--font-display); font-weight: 900;
      font-size: clamp(16rem, 40vw, 32rem); color: var(--surface);
      user-select: none; pointer-events: none; z-index: 0;
      line-height: 1; letter-spacing: -.05em;
      animation: sway 8s ease-in-out infinite;
    }

    .content { position: relative; z-index: 1; }

    .error-badge {
      display: inline-block; font-family: var(--font-mono); font-size: .75rem;
      color: var(--accent2); border: 1px solid var(--accent2);
      padding: .3rem 1rem; border-radius: 4px; letter-spacing: .15em;
      text-transform: uppercase; margin-bottom: 1.5rem;
      opacity: 0; animation: fadeUp .5s .1s forwards;
    }
    h1 {
      font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900; line-height: 1.1; margin-bottom: 1rem;
      opacity: 0; animation: fadeUp .5s .2s forwards;
    }
    h1 span { color: var(--accent2); }
    .desc {
      color: var(--muted); line-height: 1.8; max-width: 440px; margin: 0 auto 2.5rem;
      opacity: 0; animation: fadeUp .5s .3s forwards;
    }

    .code-block {
      display: inline-block;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.5rem; margin-bottom: 2.5rem;
      font-family: var(--font-mono); font-size: .8rem; text-align: left;
      opacity: 0; animation: fadeUp .5s .4s forwards;
    }
    .cm { color: var(--muted); } .err { color: var(--accent2); }
    .ok { color: #28c864; }

    .links {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      opacity: 0; animation: fadeUp .5s .5s forwards;
    }
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .75rem 1.8rem; border-radius: 8px;
      text-decoration: none; font-size: .9rem; font-weight: 500; transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 0 25px rgba(108,99,255,.3); }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-1deg) scale(1); }
      50%       { transform: rotate(1deg) scale(1.02); }
    }
  </style>
</head>
<body>

  <div class="bg-404">404</div>

  <div class="content">
    <span class="error-badge">HTTP 404 — Not Found</span>
    <h1>Lost in the<br /><span>void.</span></h1>
    <p class="desc">
